<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bus Ticket Reservation</title>

<style>
body{
    margin:0;
    padding:20px;
    background:#dcdcdc;
    font-family: "Times New Roman", serif;
}

.form-container{
    max-width:700px;
    margin:auto;
    background:#efefef;
    border:1px solid #000;
    padding:15px 25px 25px;
}

h2{
    text-align:center;
    margin-top:0;
    margin-bottom:20px;
    font-size:32px;
}

.form-row{
    display:flex;
    align-items:center;
    margin-bottom:10px;
}

.form-row label{
    width:220px;
    font-size:18px;
}

.form-row input,
.form-row textarea,
.form-row select{
    flex:1;
    padding:4px;
    font-size:16px;
    border:1px solid #999;
    background:#fff;
    box-sizing:border-box;
}

textarea{
    resize:none;
    height:55px;
}

.gender-box{
    display:flex;
    align-items:center;
    gap:20px;
    font-size:18px;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:40px;
    margin-top:20px;
}

button{
    padding:5px 18px;
    font-size:18px;
    cursor:pointer;
}

@media(max-width:768px){
    .form-row{
        flex-direction:column;
        align-items:flex-start;
    }

    .form-row label{
        width:100%;
        margin-bottom:5px;
    }

    .form-row input,
    .form-row textarea,
    .form-row select{
        width:100%;
    }

    .gender-box{
        flex-wrap:wrap;
    }
}
</style>
</head>

<body>

<div class="form-container">

<h2>Seat | Reservation</h2>
<form id="registerForm">

    <div class="form-row">
        <label>Name :</label>
        <input type="text" name="name" required>
    </div>

    <div class="form-row">
        <label>Address :</label>
        <textarea name="address" required></textarea>
    </div>

    <div class="form-row">
        <label>Contact No :</label>
        <input type="tel" name="contact_number" placeholder="+265..." required>
    </div>

    <div class="form-row">
        <label>Source Station :</label>
        <select name="source_station" required>
            <option value="">Select Source</option>
            <option>Chitipa</option>
            <option>Karonga</option>
            <option>Rumphi</option>
            <option>Mzuzu</option>
            <option>Mzimba</option>
            <option>Kasungu</option>
            <option>Lilongwe</option>
            <option>Blantyre</option>
            <option>NkhataBay</option>
            <option>Dwangwa</option>
            <option>Nkhotakota</option>
            <option>Salima</option>
        </select>
    </div>

    <div class="form-row">
        <label>Destination :</label>
        <input type="text" name="destination" required>
    </div>

    <div class="form-row">
        <label>Date Of Booking :</label>
        <input type="date" name="date_of_booking" required>
    </div>

    <div class="form-row">
        <label>Date Of Journey :</label>
        <input type="date" name="date_of_journey" required>
    </div>

    <div class="form-row">
        <label>Number Of Passengers :</label>
        <input type="number" name="number_of_passengers" min="1" required>
    </div>

    <div class="form-row">
        <label>Passenger Name :</label>
        <input type="text" name="passenger_name" required>
    </div>

    <div class="form-row">
        <label>Gender :</label>

        <div class="gender-box">
            <label>
                <input type="radio" name="gender" value="Male" required>
                Male
            </label>

            <label>
                <input type="radio" name="gender" value="Female">
                Female
            </label>
        </div>
    </div>

    <div class="buttons">
        <button type="submit">Submit</button>
        <button type="reset">Reset</button>
    </div>

</form>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBby_IF_uDrXS8IKrERZ4T_27gaMyBstSQ",
  authDomain: "login-form-be4da.firebaseapp.com",
  projectId: "login-form-be4da",
  storageBucket: "login-form-be4da.firebasestorage.app",
  messagingSenderId: "111575470518",
  appId: "1:111575470518:web:998c71ba668b1534567117"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

document.getElementById("registerForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const data = {
    name: document.querySelector('input[name="name"]').value,
    address: document.querySelector('textarea[name="address"]').value,
    contact_number: document.querySelector('input[name="contact_number"]').value,
    source_station: document.querySelector('select[name="source_station"]').value,
    destination: document.querySelector('input[name="destination"]').value,
    date_of_booking: document.querySelector('input[name="date_of_booking"]').value,
    date_of_journey: document.querySelector('input[name="date_of_journey"]').value,
    number_of_passengers: document.querySelector('input[name="number_of_passengers"]').value,
    passenger_name: document.querySelector('input[name="passenger_name"]').value,
    gender: document.querySelector('input[name="gender"]:checked')?.value || "",
    createdAt: serverTimestamp()
  };

  try {
    await addDoc(collection(db, "registrations"), data);

    alert("Registration successful!");

    window.location.href = "Homepage.html";

  } catch (error) {
    console.error(error);
    alert("Registration failed. Try again.");
  }
});
</script>

</body>
</html>
