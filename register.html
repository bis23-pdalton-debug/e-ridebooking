<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bus Ticket Reservation</title>

<style>
body{
    margin:0;
    padding:20px;
    background:#dcdcdc;
    font-family:"Times New Roman", serif;
}

.form-container{
    max-width:700px;
    margin:auto;
    background:#efefef;
    border:1px solid #000;
    padding:15px 25px 25px;
}

h2{
    text-align:center;
    margin-top:0;
    margin-bottom:20px;
    font-size:32px;
}

.form-row{
    display:flex;
    align-items:center;
    margin-bottom:10px;
}

.form-row label{
    width:220px;
    font-size:18px;
}

.form-row input,
.form-row textarea,
.form-row select{
    flex:1;
    padding:4px;
    font-size:16px;
    border:1px solid #999;
    background:#fff;
    box-sizing:border-box;
}

textarea{
    resize:none;
    height:55px;
}

.gender-box{
    display:flex;
    align-items:center;
    gap:20px;
    font-size:18px;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:40px;
    margin-top:20px;
}

button{
    padding:5px 18px;
    font-size:18px;
    cursor:pointer;
}

button:disabled{
    cursor:not-allowed;
    opacity:0.7;
}

.success-screen{
    display:none;
    min-height:100vh;
    background:#fff;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:26px;
    font-family:Arial, sans-serif;
}

body.success-mode{
    background:#fff;
    padding:0;
}

body.success-mode .form-container{
    display:none;
}

body.success-mode .success-screen{
    display:flex;
}

.success-content{
    width:100%;
    max-width:430px;
    margin-top:42px;
}

.success-check-wrap{
    width:126px;
    height:126px;
    border-radius:50%;
    background:rgba(194,255,225,0.42);
    display:flex;
    align-items:center;
    justify-content:center;
    margin:120px auto 30px;
}

.success-check-circle{
    width:76px;
    height:76px;
    border-radius:50%;
    background:#c8f7db;
    display:flex;
    align-items:center;
    justify-content:center;
}

.success-check{
    width:29px;
    height:16px;
    border-left:5px solid #00a651;
    border-bottom:5px solid #00a651;
    transform:rotate(-45deg);
    margin-top:-5px;
}

.success-title{
    font-size:30px;
    line-height:1.15;
    color:#121728;
    font-weight:800;
    margin:0 0 20px;
}

.success-message{
    font-size:24px;
    line-height:1.45;
    color:#4f5565;
    margin:0 auto;
    max-width:390px;
}

.success-message strong{
    color:#111827;
    font-weight:800;
}

@media(max-width:768px){
    .form-row{
        flex-direction:column;
        align-items:flex-start;
    }

    .form-row label{
        width:100%;
        margin-bottom:5px;
    }

    .form-row input,
    .form-row textarea,
    .form-row select{
        width:100%;
    }

    .gender-box{
        flex-wrap:wrap;
    }
}

@media(max-width:520px){
    .success-content{
        margin-top:10px;
    }

    .success-check-wrap{
        width:124px;
        height:124px;
    }

    .success-title{
        font-size:29px;
    }

    .success-message{
        font-size:24px;
    }
}
</style>
</head>

<body>

<div class="form-container">

<h2>Seat | Reservation</h2>

<form id="registerForm">

    <div class="form-row">
        <label>Student Name :</label>
        <input type="text" name="name" required>
    </div>

    <div class="form-row">
        <label>Contact No :</label>
        <input type="tel" name="contact_number" placeholder="+265..." required>
    </div>

    <div class="form-row">
        <label>Source Station :</label>
        <select name="source_station" required>
            <option value="">Select Source</option>
            <option>Chitipa</option>
            <option>Karonga</option>
            <option>Rumphi</option>
            <option>Mzuzu</option>
            <option>Mzimba</option>
            <option>Kasungu</option>
            <option>Lilongwe</option>
            <option>Blantyre</option>
            <option>NkhataBay</option>
            <option>Dwangwa</option>
            <option>Nkhotakota</option>
            <option>Salima</option>
        </select>
    </div>

    <div class="form-row">
        <label>Destination :</label>
        <input type="text" name="destination" required>
    </div>

    <div class="form-row">
        <label>Date Of Booking :</label>
        <input type="date" name="date_of_booking" required>
    </div>

    <div class="form-row">
        <label>Date Of Journey :</label>
        <input type="date" name="date_of_journey" required>
    </div>

    <div class="form-row">
        <label>Gender :</label>

        <div class="gender-box">
            <label>
                <input type="radio" name="gender" value="Male" required>
                Male
            </label>

            <label>
                <input type="radio" name="gender" value="Female">
                Female
            </label>
        </div>
    </div>

    <div class="buttons">
        <button type="submit" id="submitBtn">Submit</button>
        <button type="reset">Reset</button>
    </div>

</form>

</div>

<section class="success-screen" id="successScreen" aria-live="polite">
    <div class="success-content">

        <div class="success-check-wrap" aria-hidden="true">
            <div class="success-check-circle">
                <span class="success-check"></span>
            </div>
        </div>

        <h1 class="success-title">
            Successfully Registered!
        </h1>

        <p class="success-message">
            for <strong>MPOTO RIDE</strong>, proceed for booking.
        </p>

    </div>
</section>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";

import {
  getFirestore,
  collection,
  addDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBby_IF_uDrXS8IKrERZ4T_27gaMyBstSQ",
  authDomain: "login-form-be4da.firebaseapp.com",
  projectId: "login-form-be4da",
  storageBucket: "login-form-be4da.firebasestorage.app",
  messagingSenderId: "111575470518",
  appId: "1:111575470518:web:998c71ba668b1534567117"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const registerForm = document.getElementById("registerForm");
const submitBtn = document.getElementById("submitBtn");

function showSuccessMessage() {

  document.body.classList.add("success-mode");

  window.scrollTo({
    top: 0,
    behavior: "smooth"
  });

  // AUTO REDIRECT TO HOMEPAGE
  setTimeout(() => {
    window.location.href = "homepage.html";
  }, 3000);
}

registerForm.addEventListener("submit", async (e) => {

  e.preventDefault();

  submitBtn.disabled = true;
  submitBtn.textContent = "Submitting...";

  const data = {
    name: document.querySelector('input[name="name"]').value,
    contact_number: document.querySelector('input[name="contact_number"]').value,
    source_station: document.querySelector('select[name="source_station"]').value,
    destination: document.querySelector('input[name="destination"]').value,
    date_of_booking: document.querySelector('input[name="date_of_booking"]').value,
    date_of_journey: document.querySelector('input[name="date_of_journey"]').value,
    gender: document.querySelector('input[name="gender"]:checked')?.value || "",
    registration_status: "successful",
    createdAt: serverTimestamp()
  };

  try {

    await addDoc(collection(db, "registrations"), data);

    registerForm.reset();

    showSuccessMessage();

  } catch (error) {

    console.error(error);

    alert("Registration failed. Try again.");

    submitBtn.disabled = false;
    submitBtn.textContent = "Submit";
  }

});
</script>

</body>
</html>
