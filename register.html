<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<title>BOOKING | MPTOTO COACHES</title>
<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#0b1f3a;
}

header{
  background:#1e3a8a;
  padding:15px 40px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  color:white;

  position: sticky;
  top: 0;
  z-index: 1000;
}

.container{
  display:flex;
  gap:20px;
  padding:30px;
  flex-wrap:wrap;
}

.left,.right{
  flex:1;
  min-width:300px;
}

/* FLAT CARD (NO 3D EFFECT) */
.card{
  background:#ffffff;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
  border:1px solid #e5e7eb;
}

.card h3{
  color:#0b1f3a;
  font-weight:700;
  margin-bottom:15px;
  text-align:center;
  padding-bottom:8px;
  border-bottom:2px solid #e5e7eb; /* subtle separator line */
}

/* INPUTS */
.input-group{
  display:flex;
  gap:10px;
  margin-bottom:12px;
}

input, select{
  flex:1;
  padding:15px;
  border:1px solid #cbd5e1;
  background:#ffffff;
  border-radius:8px;
  color:#0b1f3a;
  font-size:17px;
}

input::placeholder{
  color:#64748b;
}

input:focus, select:focus{
  outline:none;
  border:2px solid #1e90ff;
}

select{
  cursor:pointer;
}

.full{
  width:100%;
  margin-bottom:15px;
}

/* make standalone inputs align like grouped ones */
.card > input,
.card > select{
  width:94%;
}

.card p{
  color:#0b1f3a;
  font-weight:500;
}

.pay-btn{
  width:100%;
  padding:15px;
  background:#1e90ff;
  color:white;
  border:none;
  border-radius:8px;
  font-size:16px;
  cursor:pointer;
}
@media (max-width: 768px){

  .input-group{
    flex-direction: column;
  }

  .input-group input[name="first_name"],
  .input-group input[name="last_name"],
  .input-group input[name="country_code"],
  .input-group input[name="phone"]{
    width: 94%;
    flex: unset;
  }

}
/* CONTROL WIDTH OF SPECIFIC INPUTS */
.input-group input[name="last_name"]{
  flex: 0.7;
}

.input-group input[name="phone"]{
  flex: 1.3;
}

.input-group input[name="country_code"]{
  flex: 0.6;
}
</style>
</head>

<body>

<header>
  <h2>MPOTO COACHES</h2>
  <div>Registration Page</div>
</header>

<form action="https://api.web3forms.com/submit" method="POST">

  <input type="hidden" name="access_key" value="d7c0489d-062e-4fa3-b98b-6d5aa4bf7265">
  <input type="hidden" name="subject" value="New Coach Registration Booking">
  <input type="hidden" name="redirect" value="http://127.0.0.1:5500/Homepage.html">

<div class="container">

  <!-- LEFT -->
  <div class="left">

    <div class="card">
      <h3><i class="fa-solid fa-user"></i> Primary Passenger</h3>

      <div class="input-group">
        <input type="text" name="first_name" placeholder="First Name" required>
        <input type="text" name="last_name" placeholder="Last Name" required>
      </div>

      <!-- DATE NOW CLEARLY INSIDE CARD -->
      <input type="date" name="dod" required>
    </div>

    <div class="card">
      <h3><i class="fa-solid fa-address-book"></i> Contact Information</h3>

      <select class="full" name="location" required>
        <option>Chitipa</option>
        <option>Karonga</option>
        <option>Rumphi</option>
        <option>Mzuzu City</option>
        <option>Mzimba</option>
        <option>Kasungu</option>
        <option>Nkhata-Bay</option>
        <option>Dwangwa</option>
        <option>Nkhotakota</option>
        <option>Salima</option>
        <option>Lilongwe</option>
      </select>

      <div class="input-group">
        <input type="text" value="+265" name="country_code">
        <input type="text" name="phone" placeholder="Quadian +265" required>
      </div>

      <!-- EMAIL CLEARLY INSIDE SAME CARD -->
      <input type="email" name="email" placeholder="Email" required>
    </div>

  </div>

  <!-- RIGHT -->
  <div class="right">

    <div class="card">
      <h3>TRIP DETAILS</h3>
      <p><strong>MPOTO RIDE COACHES</strong></p>
      <p>Departure: 16:00 hrs</p>
      <p>Date: 25th July, 2026</p>
    </div>

    <div class="card">
      <h3>DEPOSIT FARE</h3>
      <p>K10,000</p>
      <h3>TOTAL FARE</h3>
      <p>K110,000</p>
    </div>

  </div>

</div>

<div style="padding:0 30px 30px;">
  <button type="submit" class="pay-btn">
    Confirm Registration →
  </button>
</div>

</form>

</body>
</html>
