<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getAuth, confirmPasswordReset } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBby_IF_uDrXS8IKrERZ4T_27gaMyBstSQ",
  authDomain: "login-form-be4da.firebaseapp.com",
  projectId: "login-form-be4da",
  storageBucket: "login-form-be4da.firebasestorage.app",
  messagingSenderId: "111575470518",
  appId: "1:111575470518:web:998c71ba668b1534567117"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// ✅ Get reset code from Firebase link
const params = new URLSearchParams(window.location.search);
const oobCode = params.get("oobCode");
const mode = params.get("mode");

const msg = document.getElementById("msg");

// ❌ invalid link handling
if (!oobCode || mode !== "resetPassword") {
  msg.innerText = "Invalid or expired reset link. Request a new one.";
}

window.updatePassword = async function () {

  const pass1 = document.getElementById("newPassword").value;
  const pass2 = document.getElementById("confirmPassword").value;

  if (!pass1 || !pass2) {
    msg.innerText = "Fill both password fields";
    return;
  }

  if (pass1 !== pass2) {
    msg.innerText = "Passwords do not match";
    return;
  }

  try {
    await confirmPasswordReset(auth, oobCode, pass1);

    msg.innerText = "Password updated successfully! You can now log in.";

  } catch (error) {
    msg.innerText = error.message;
  }
}
</script>
